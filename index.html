<!DOCTYPE html>
<html>
    <!--
        Estructura de la página
        Autor: Diego León
    -->
    <head>
        <title>TETRIZ</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/icon.png">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    </head>
    <body>
        <div style="position: absolute;height: 100vh; width: 100vw; z-index: -2;">
            <div id="b1" class="bc"></div>
            <div id="b2" class="bc"></div>
            <div id="b3" class="bc"></div>
            <div id="b4" class="bc"></div>
            <div id="b5" class="bc"></div>
            <div id="b6" class="bc"></div>
            <div id="b0"></div>
        </div>
        <div id="spc">
            <canvas id="gm" width="320" height="640" style="opacity:1; z-index: -1;"></canvas>
            <div id="nspc">
                <canvas id="next" width="192" height="192" style="opacity:0; z-index: -1;"></canvas>
            </div>
            <div id="ispc">
                <div id="info">
                    <h1 style="position: relative; text-align: center;">TETRIZ</h1>
                    <p class="txt" id="speed">0 b/s</p>
                    <p class="txt" id="points">puntos: ---</p>
                    <p class="txt" id="time">tiempo: -:--.-</p>
                    <p class="txt">mejor puntuación</p>
                    <p class="txt rbwdiv" id="bestp">---</p>
                    <p class="txt">mejor tiempo</p>
                    <p class="txt rbwdiv" id="bestt">---</p>
                </div>
            </div>
        </div>
        <script type="module" src="main.js"></script>
    </body>
</html>
